<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Darion CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            position: relative;
            overflow: hidden;
        }

        /* Animated orbs */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            animation: float 8s ease-in-out infinite;
        }
        body::before {
            width: 400px; height: 400px;
            background: #7c3aed;
            top: -100px; left: -100px;
        }
        body::after {
            width: 350px; height: 350px;
            background: #2563eb;
            bottom: -80px; right: -80px;
            animation-delay: -4s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }
        .brand-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .brand-icon svg { width: 20px; height: 20px; stroke: #fff; }
        .brand-name { font-size: 1.35rem; font-weight: 700; color: #fff; }
        .brand-sub  { font-size: .7rem; color: rgba(255,255,255,.45); letter-spacing: .08em; text-transform: uppercase; margin-top: 1px; }

        h1 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .subtitle { font-size: .88rem; color: rgba(255,255,255,.5); margin-bottom: 32px; }

        .field { margin-bottom: 18px; }
        label { display: block; font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.6); margin-bottom: 7px; letter-spacing: .04em; }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: .95rem;
            font-family: inherit;
            transition: border-color .2s, box-shadow .2s;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,.3); }
        input:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124,58,237,.25);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity .2s, transform .15s;
            letter-spacing: .01em;
        }
        .btn-login:hover   { opacity: .9; transform: translateY(-1px); }
        .btn-login:active  { transform: translateY(0); }
        .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

        #errorMsg {
            display: none;
            background: rgba(239,68,68,.15);
            border: 1px solid rgba(239,68,68,.35);
            color: #fca5a5;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: .85rem;
            margin-bottom: 16px;
            text-align: center;
        }

        .footer-note {
            text-align: center;
            margin-top: 28px;
            font-size: .75rem;
            color: rgba(255,255,255,.25);
        }

        @media (max-width: 480px) {
            .login-card { padding: 36px 24px; margin: 16px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="9" y1="21" x2="9" y2="9"/>
                </svg>
            </div>
            <div>
                <div class="brand-name">Darion CRM</div>
                <div class="brand-sub">Sales Intelligence</div>
            </div>
        </div>

        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to your account to continue</p>

        <div id="errorMsg"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="field">
                <label for="email">EMAIL ADDRESS</label>
                <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
            </div>
            <div class="field">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
        </form>

        <p class="footer-note">Darion CRM · Internal Portal</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL  = 'https://ajrtewupbfupxpwwvrcz.supabase.co';
        const SUPABASE_KEY  = 'sb_publishable_92ZS2ML3dAMDN9inMpjwqA_her1Be4K';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // If already logged in, go straight to app
        sb.auth.getSession().then(({ data }) => {
            if (data.session) window.location.replace('index.html');
        });

        async function handleLogin(e) {
            e.preventDefault();
            const btn   = document.getElementById('loginBtn');
            const email = document.getElementById('email').value.trim();
            const pass  = document.getElementById('password').value;
            const errEl = document.getElementById('errorMsg');

            btn.disabled     = true;
            btn.textContent  = 'Signing in…';
            errEl.style.display = 'none';

            const { error } = await sb.auth.signInWithPassword({ email, password: pass });

            if (error) {
                errEl.textContent    = error.message || 'Invalid email or password.';
                errEl.style.display  = 'block';
                btn.disabled         = false;
                btn.textContent      = 'Sign In';
            } else {
                window.location.replace('index.html');
            }
        }
    </script>
</body>
</html>
